version: 2
project_name: localtunnel-go

builds:
  - id: server
    main: ./cmd/server/main.go
    binary: server
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: client
    main: ./cmd/client/main.go
    binary: client
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip